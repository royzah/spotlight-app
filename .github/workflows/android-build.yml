name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Prettier check
        run: npx prettier --check '**/*.{ts,md,yml,yaml,json,html}'

      - name: Markdown lint
        run: npx markdownlint '*.md' --ignore node_modules

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             build-output/trustsky-spotlight-debug.apk

      - name: Upload debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        id: upload-debug
        uses: actions/upload-artifact@v4
        with:
          name: trustsky-spotlight-debug
          path: build-output/trustsky-spotlight-debug.apk
          retention-days: 14

      - name: QR code in job summary
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sudo apt-get install -y -qq qrencode > /dev/null 2>&1
          qrencode -t UTF8 "$ARTIFACT_URL" > /tmp/qr.txt
          {
            echo "### TrustSky Spotlight Debug APK"
            echo ""
            echo "Download from the **Artifacts** section below."
            echo ""
            echo '```'
            cat /tmp/qr.txt
            echo '```'
            echo ""
            echo "Scan to open this run: $ARTIFACT_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Release (on tag push) ──────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/trustsky-spotlight.keystore

      - name: Build release APK and AAB
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: trustsky-spotlight.keystore
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk \
             build-output/trustsky-spotlight-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab \
             build-output/trustsky-spotlight-release.aab

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: trustsky-spotlight-release-apk
          path: build-output/trustsky-spotlight-release.apk
          retention-days: 90

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: trustsky-spotlight-release-aab
          path: build-output/trustsky-spotlight-release.aab
          retention-days: 90
