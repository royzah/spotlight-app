name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Prettier check
        run: npx prettier --check '**/*.{ts,md,yml,yaml,json,html}'

      - name: Markdown lint
        run: npx markdownlint '*.md' --ignore node_modules

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Provision server CA cert
        env:
          SPOTLIGHT_SERVER_CA: ${{ secrets.SPOTLIGHT_SERVER_CA }}
        run: |
          if [ -z "$SPOTLIGHT_SERVER_CA" ]; then
            echo "::error::SPOTLIGHT_SERVER_CA secret is not set. It holds the base64 comms-utm-ca cert that network_security_config.xml pins as @raw/spotlight_server."
            exit 1
          fi
          mkdir -p android/app/src/main/res/raw
          echo "$SPOTLIGHT_SERVER_CA" | base64 -d > android/app/src/main/res/raw/spotlight_server.pem
          echo "Wrote $(wc -c < android/app/src/main/res/raw/spotlight_server.pem) bytes"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             build-output/trustsky-spotlight-debug.apk

      - name: Upload APK artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: trustsky-spotlight-debug
          path: build-output/trustsky-spotlight-debug.apk

      - name: Job summary
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          {
            echo "### TrustSky Spotlight Debug APK"
            echo ""
            echo "Download the **trustsky-spotlight-debug** artifact from the Artifacts section below."
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Release (on tag push) ──────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/trustsky-spotlight.keystore

      - name: Build release APK and AAB
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: trustsky-spotlight.keystore
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk \
             build-output/trustsky-spotlight-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab \
             build-output/trustsky-spotlight-release.aab

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build-output/trustsky-spotlight-release.apk \
            build-output/trustsky-spotlight-release.aab \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

      - name: Release summary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          {
            echo "### TrustSky Spotlight ${{ github.ref_name }}"
            echo ""
            echo "Release created with signed APK and AAB."
            echo ""
            echo "- [View release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
