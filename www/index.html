<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TrustSky Spotlight</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #131318;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      .container {
        text-align: center;
        max-width: 320px;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1a1a24, #2a2a3a);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 32px;
        height: 32px;
        fill: none;
        stroke: #6366f1;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #ffffff;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #9ca3af;
        margin-bottom: 24px;
      }
      button {
        background: #6366f1;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:active {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <h1>Unable to Connect</h1>
      <p>
        Cannot reach the TrustSky Spotlight server. Please check your internet connection and try
        again.
      </p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
