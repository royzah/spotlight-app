<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TrustSky Spotlight</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #131318;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      .container {
        text-align: center;
        max-width: 320px;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1a1a24, #2a2a3a);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 36px;
        height: 36px;
        fill: none;
        stroke: #ef4444;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #ffffff;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #9ca3af;
        margin-bottom: 24px;
      }
      .warning {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 24px;
        font-size: 13px;
        color: #fca5a5;
        line-height: 1.5;
      }
      button {
        background: #6366f1;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:active {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>No Internet Connection</h1>
      <div class="warning">
        TrustSky Spotlight requires an active internet connection to operate. Connect to Wi-Fi or
        mobile data and try again.
      </div>
      <p>
        This app needs a network connection for real-time drone monitoring, map data, and
        authentication.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
